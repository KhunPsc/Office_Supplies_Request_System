<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มรายการ QuickSelect | ระบบวัสดุสำนักงาน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --eco-green: #10b981;
            --tip-bg: #eff6ff;
            --tip-text: #1e40af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', 'IBM Plex Sans Thai', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="url"],
        select {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .eco-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .eco-toggle:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .eco-toggle input {
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
            accent-color: var(--eco-green);
        }

        .eco-toggle span {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--eco-green);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            padding: 0.75rem;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: #ecfdf5;
            color: #065f46;
            display: block;
        }

        .status-error {
            background: #fef2f2;
            color: #991b1b;
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .field-tip {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            background: var(--tip-bg);
            color: var(--tip-text);
            padding: 4px 10px;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .glass-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <h1>✨ เพิ่มรายการวัสดุ</h1>
                <p>จัดการคลังวัสดุยอดนิยม (QuickSelect)</p>
            </div>

            <form id="quickSelectForm">
                <div class="form-group">
                    <label for="itemName">ชื่อวัสดุ / รายละเอียด <span style="color: #ef4444;">*</span></label>
                    <div class="input-wrapper">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="m21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                            </path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <input type="text" id="itemName" name="itemName" required
                            placeholder="เช่น ปากกาลูกลื่น สีน้ำเงิน">
                    </div>
                </div>

                <div class="form-group">
                    <label for="unit">หน่วยนับ <span style="color: #ef4444;">*</span></label>
                    <div class="input-wrapper">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                            </path>
                            <path d="m3.3 7 8.7 5 8.7-5"></path>
                            <path d="M12 22V12"></path>
                        </svg>
                        <input type="text" id="unit" name="unit" required placeholder="เช่น ด้าม, แพ็ค, รีม">
                    </div>
                </div>

                <div class="form-group">
                    <label for="imageUrl">
                        URL รูปตัวอย่าง <span style="color: #ef4444;">*</span>
                        <span class="field-tip">💡 ค้นหารูปภาพจาก Google และเลือก "Copy image address" เพื่อนำลิงก์มาวางที่นี่</span>
                    </label>
                    <div class="input-wrapper">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                            <circle cx="9" cy="9" r="2"></circle>
                            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                        </svg>
                        <input type="url" id="imageUrl" name="imageUrl" required
                            placeholder="https://example.com/image.jpg">
                    </div>
                </div>

                <div class="form-group">
                    <label class="eco-toggle">
                        <input type="checkbox" id="isEcoFriendly" name="isEcoFriendly">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="color: var(--eco-green);">
                            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a8 8 0 0 1-10 10Z">
                            </path>
                            <path d="M11 20c-1 0-2-3-3-3s-2 3-3 3"></path>
                            <path d="M9.5 14c.5-1.5 2-2.5 3.5-2.5"></path>
                        </svg>
                        <span>วัสดุเป็นมิตรต่อสิ่งแวดล้อม (Eco-friendly)</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span id="btnText">บันทึกข้อมูล</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>

                <div id="statusMsg" class="status-msg"></div>
            </form>

            <a href="index.html" class="back-link">← กลับไปยังหน้าหลัก</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('quickSelectForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const statusMsg = document.getElementById('statusMsg');

        // ดึงข้อมูลผู้ใช้จาก sessionStorage ของระบบหลัก (ถ้ามี)
        const currentUser = JSON.parse(sessionStorage.getItem('userData') || '{}');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                action: 'addQuickSelect',
                updatedBy: currentUser.User || 'Unknown',
                itemName: document.getElementById('itemName').value,
                unit: document.getElementById('unit').value,
                imageUrl: document.getElementById('imageUrl').value,
                isEcoFriendly: document.getElementById('isEcoFriendly').checked
            };

            setLoading(true);

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showStatus('✅ เพิ่มรายการสำเร็จแล้ว!', 'success');
                    form.reset();
                } else {
                    showStatus('❌ เกิดข้อผิดพลาด: ' + result.message, 'error');
                }
            } catch (error) {
                showStatus('❌ ไม่สามารถติดต่อเซิร์ฟเวอร์ได้: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'block';
            btnSpinner.style.display = isLoading ? 'block' : 'none';
        }

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg ' + (type === 'success' ? 'status-success' : 'status-error');
            statusMsg.style.display = 'block'; // Ensure it's shown
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>

</html>
